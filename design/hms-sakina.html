<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sakīna · HMS — Konoz / Ijabah</title>

<!-- ── Typography: Fraunces (display/figures) + Hanken Grotesk (UI) ── -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400..600&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --paper:    #F2ECE0;
    --paper-2:  #EBE3D4;
    --card:     #FAF6EE;
    --card-2:   #F5EFE3;
    --ink:      #1C1812;
    --ink-2:    #6A6151;
    --ink-3:    #9C927F;
    --line:     rgba(28,24,18,0.11);
    --line-2:   rgba(28,24,18,0.06);
    --gold:     #A87B2E;
    --gold-2:   #C29A4B;
    --gold-soft:#EAD9B4;
    --emerald:  #2E5A48;
    --emerald-soft:#D7E2D5;
    --brick:    #9A3B30;
    --brick-soft:#EBD3CB;
    --konoz:    #2C4B6E;
    --ijabah:   #B0883A;
    --shadow:   0 1px 2px rgba(28,24,18,.04), 0 12px 30px -14px rgba(28,24,18,.18);
    --shadow-lg:0 2px 4px rgba(28,24,18,.05), 0 40px 70px -30px rgba(28,24,18,.30);
    --r:18px;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:'Hanken Grotesk', sans-serif;
    color:var(--ink);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  ::selection{ background:var(--gold-soft); color:var(--ink); }

  /* ── Ambient background: warm light + faint khatam geometry + grain ── */
  .bg-field{ position:fixed; inset:0; z-index:0; pointer-events:none; }
  .bg-glow{
    position:absolute; inset:-20%;
    background:
      radial-gradient(60% 50% at 78% 8%, rgba(194,154,75,.18), transparent 60%),
      radial-gradient(50% 45% at 8% 92%, rgba(46,90,72,.10), transparent 60%),
      radial-gradient(90% 80% at 50% 0%, rgba(250,246,238,.7), transparent 70%);
  }
  .bg-geo{ position:absolute; inset:0; opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' viewBox='0 0 120 120'><g fill='none' stroke='%231C1812' stroke-width='1'><path d='M60 6 70 34 98 22 86 50 114 60 86 70 98 98 70 86 60 114 50 86 22 98 34 70 6 60 34 50 22 22 50 34z'/><circle cx='60' cy='60' r='20'/></g></svg>");
    background-size:240px 240px;
  }
  .bg-grain{ position:absolute; inset:0; opacity:.20; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
  }

  /* ── App shell ── */
  .app{ position:relative; z-index:1; display:grid; grid-template-columns:248px 1fr; min-height:100vh; }

  /* ── Sidebar ── */
  .side{
    position:sticky; top:0; align-self:start; height:100vh;
    display:flex; flex-direction:column;
    padding:30px 22px; border-right:1px solid var(--line);
    background:linear-gradient(180deg, rgba(250,246,238,.5), rgba(242,236,224,.2));
    backdrop-filter:blur(2px);
  }
  .brand{ display:flex; align-items:center; gap:13px; margin-bottom:42px; }
  .brand-mark{ width:40px; height:40px; flex-shrink:0; }
  .brand-txt{ line-height:1; }
  .brand-name{ font-family:'Fraunces',serif; font-weight:600; font-size:21px; letter-spacing:.2px; }
  .brand-sub{ font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-3); margin-top:4px; }

  .nav-label{ font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-3); margin:0 8px 12px; }
  .nav{ display:flex; flex-direction:column; gap:3px; }
  .nav-item{
    position:relative; display:flex; align-items:center; gap:13px;
    padding:11px 13px; border-radius:12px; cursor:pointer;
    font-size:14px; font-weight:500; color:var(--ink-2);
    border:1px solid transparent;
    transition:color .25s, background .25s;
  }
  .nav-item:hover{ color:var(--ink); background:rgba(168,123,46,.07); }
  .nav-item.active{ color:var(--ink); background:var(--card); border-color:var(--line); box-shadow:var(--shadow); }
  .nav-item .ico{ width:18px; height:18px; flex-shrink:0; opacity:.8; }
  .nav-item.active .ico{ opacity:1; color:var(--gold); }
  .nav-dot{ position:absolute; left:-22px; top:50%; width:3px; height:0; border-radius:3px; background:var(--gold); transform:translateY(-50%); transition:height .3s; }
  .nav-item.active .nav-dot{ height:22px; }

  .side-foot{ margin-top:auto; padding-top:22px; border-top:1px solid var(--line); }
  .switcher{ display:flex; background:var(--paper-2); border-radius:11px; padding:4px; gap:4px; border:1px solid var(--line-2); }
  .switch-btn{ flex:1; padding:8px 6px; border:none; background:transparent; border-radius:8px; cursor:pointer;
    font-family:'Hanken Grotesk'; font-size:12px; font-weight:600; color:var(--ink-3); transition:.2s; }
  .switch-btn.on{ background:var(--card); color:var(--ink); box-shadow:var(--shadow); }
  .switch-btn.on.konoz{ color:var(--konoz); }
  .switch-btn.on.ijabah{ color:var(--ijabah); }
  .who{ display:flex; align-items:center; gap:11px; margin-top:18px; }
  .who-av{ width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--gold-2),var(--gold)); display:grid; place-items:center; color:#fff; font-weight:600; font-size:13px; font-family:'Fraunces'; flex-shrink:0; }
  .who-name{ font-size:13px; font-weight:600; }
  .who-role{ font-size:11px; color:var(--ink-3); }

  /* ── Main ── */
  .main{ padding:34px 46px 80px; max-width:1180px; }
  .topbar{ display:flex; align-items:flex-end; justify-content:space-between; gap:24px; margin-bottom:34px; }
  .eyebrow{ font-size:11px; letter-spacing:.24em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:10px; display:flex; align-items:center; gap:9px; }
  .eyebrow::before{ content:''; width:22px; height:1px; background:var(--gold); display:inline-block; }
  h1.page{ font-family:'Fraunces',serif; font-weight:340; font-size:40px; line-height:1.04; letter-spacing:-.5px; margin:0; }
  h1.page b{ font-weight:600; font-style:italic; }
  .top-right{ text-align:right; flex-shrink:0; }
  .top-date{ font-family:'Fraunces'; font-size:16px; }
  .top-meta{ font-size:12px; color:var(--ink-3); margin-top:3px; }

  /* generic card */
  .card{ background:var(--card); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); }
  .pad{ padding:22px 24px; }
  .ttl{ font-family:'Fraunces',serif; font-size:18px; font-weight:500; margin:0; }
  .sub{ font-size:12.5px; color:var(--ink-2); }
  .hr{ height:1px; background:var(--line); border:none; margin:0; }

  /* KPI grid */
  .kgrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-bottom:24px; }
  .kpi{ padding:20px 21px; position:relative; overflow:hidden; }
  .kpi .klabel{ font-size:12px; color:var(--ink-2); display:flex; align-items:center; gap:8px; }
  .kpi .kico{ width:15px; height:15px; color:var(--gold); }
  .kpi .kval{ font-family:'Fraunces',serif; font-size:33px; font-weight:430; letter-spacing:-.5px; margin-top:14px; font-variant-numeric:tabular-nums; line-height:1; }
  .kpi .kval .cur{ font-size:14px; color:var(--ink-3); font-weight:500; margin-right:5px; }
  .kpi .kfoot{ font-size:11.5px; margin-top:11px; display:flex; align-items:center; gap:6px; color:var(--ink-3); }
  .trend{ font-weight:600; }
  .trend.up{ color:var(--emerald); } .trend.down{ color:var(--brick); }
  .kpi-accent{ position:absolute; right:-30px; top:-30px; width:110px; height:110px; border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(194,154,75,.16), transparent 70%); }

  /* layout split */
  .split{ display:grid; grid-template-columns:1.55fr 1fr; gap:22px; align-items:start; }
  .stack{ display:flex; flex-direction:column; gap:22px; }

  /* chart */
  .chart-head{ display:flex; align-items:baseline; justify-content:space-between; }
  .legend{ display:flex; gap:16px; font-size:11.5px; color:var(--ink-2); }
  .legend i{ width:9px; height:9px; border-radius:3px; display:inline-block; margin-right:6px; vertical-align:middle; }
  .bars{ display:flex; align-items:flex-end; gap:14px; height:170px; padding:14px 4px 0; }
  .barcol{ flex:1; display:flex; flex-direction:column; align-items:center; gap:9px; height:100%; justify-content:flex-end; }
  .barpair{ display:flex; gap:5px; align-items:flex-end; width:100%; height:100%; justify-content:center; }
  .bar{ width:46%; max-width:24px; border-radius:6px 6px 0 0; }
  .bar.billed{ background:linear-gradient(180deg,var(--gold-2),var(--gold)); }
  .bar.paid{ background:linear-gradient(180deg,var(--emerald),#3a6b56); }
  .barlab{ font-size:11px; color:var(--ink-3); font-weight:500; }

  /* list rows */
  .row{ display:flex; align-items:center; gap:14px; padding:14px 24px; cursor:pointer; transition:background .2s; }
  .row:hover{ background:var(--card-2); }
  .row + .row{ border-top:1px solid var(--line-2); }
  .rnum{ font-family:'Fraunces'; font-weight:600; font-size:13.5px; font-variant-numeric:tabular-nums; min-width:64px; }
  .rname{ flex:1; min-width:0; }
  .rname b{ font-weight:600; font-size:13.5px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rname span{ font-size:11.5px; color:var(--ink-3); }
  .ramt{ font-family:'Fraunces'; font-variant-numeric:tabular-nums; font-weight:500; font-size:14px; text-align:right; }

  /* pills */
  .pill{ display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600; padding:4px 11px; border-radius:9999px; letter-spacing:.02em; white-space:nowrap; }
  .pill::before{ content:''; width:6px; height:6px; border-radius:50%; background:currentColor; }
  .pill.paid{ color:var(--emerald); background:var(--emerald-soft); }
  .pill.partial{ color:var(--gold); background:var(--gold-soft); }
  .pill.unpaid{ color:var(--brick); background:var(--brick-soft); }
  .pill.flat::before{ display:none; }
  .pill.def{ color:var(--emerald); background:var(--emerald-soft); letter-spacing:.14em; }

  /* tag / chip */
  .chip{ font-size:11px; color:var(--ink-2); background:var(--paper-2); border:1px solid var(--line-2); padding:4px 10px; border-radius:8px; font-weight:500; }

  /* table */
  table.t{ width:100%; border-collapse:collapse; }
  .t th{ text-align:left; font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--ink-3); font-weight:600; padding:0 16px 13px; border-bottom:1px solid var(--line); }
  .t td{ padding:16px; border-bottom:1px solid var(--line-2); font-size:13.5px; vertical-align:middle; }
  .t tr:last-child td{ border-bottom:none; }
  .t .num{ text-align:right; font-family:'Fraunces'; font-variant-numeric:tabular-nums; font-weight:500; }
  .t .strong{ font-weight:600; }
  .t tbody tr{ transition:background .18s; }
  .t tbody tr:hover{ background:var(--card-2); }
  .tfoot td{ padding-top:18px; border-top:1.5px solid var(--ink); font-weight:600; }

  /* detail hero */
  .hero{ position:relative; overflow:hidden; padding:30px 32px; }
  .hero-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:24px; }
  .hero h2{ font-family:'Fraunces',serif; font-weight:380; font-size:30px; margin:6px 0 0; letter-spacing:-.4px; }
  .hero .who-line{ font-size:13px; color:var(--ink-2); margin-top:9px; }
  .hero-fig{ text-align:right; flex-shrink:0; }
  .hero-fig .lbl{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); }
  .hero-fig .big{ font-family:'Fraunces'; font-size:38px; font-weight:440; letter-spacing:-.5px; font-variant-numeric:tabular-nums; line-height:1.05; margin-top:6px; }
  .hero-fig .big .cur{ font-size:15px; color:var(--ink-3); margin-right:5px; }

  .meta-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line); border-radius:13px; overflow:hidden; margin-top:26px; border:1px solid var(--line); }
  .meta-cell{ background:var(--card); padding:15px 17px; }
  .meta-cell .k{ font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3); }
  .meta-cell .v{ font-size:14.5px; font-weight:600; margin-top:7px; font-family:'Fraunces'; }
  .meta-cell .v.sm{ font-size:13px; font-family:'Hanken Grotesk'; }

  /* progress arc card */
  .arc-wrap{ display:flex; align-items:center; gap:22px; }
  .arc-svg{ flex-shrink:0; }
  .arc-legend .al{ display:flex; align-items:center; gap:9px; font-size:12.5px; margin:7px 0; }
  .arc-legend .al i{ width:10px; height:10px; border-radius:3px; display:inline-block; }
  .arc-legend .al b{ font-family:'Fraunces'; font-variant-numeric:tabular-nums; margin-left:auto; padding-left:18px; }

  /* timeline */
  .tl{ position:relative; padding-left:8px; }
  .tl-item{ position:relative; padding:0 0 20px 26px; border-left:1.5px solid var(--line); margin-left:5px; }
  .tl-item:last-child{ border-left-color:transparent; padding-bottom:0; }
  .tl-dot{ position:absolute; left:-7.5px; top:2px; width:13px; height:13px; border-radius:50%; background:var(--card); border:2.5px solid var(--gold); }
  .tl-date{ font-size:11px; color:var(--ink-3); letter-spacing:.04em; }
  .tl-main{ font-size:13.5px; font-weight:600; margin-top:3px; display:flex; justify-content:space-between; gap:12px; }
  .tl-main .amt{ font-family:'Fraunces'; font-variant-numeric:tabular-nums; color:var(--emerald); }
  .tl-sub{ font-size:11.5px; color:var(--ink-3); margin-top:2px; }

  /* stars */
  .stars{ color:var(--gold); letter-spacing:2px; font-size:14px; }
  .stars .off{ color:var(--ink-3); opacity:.4; }

  /* radial map for hotel */
  .radial{ position:relative; width:100%; aspect-ratio:1/1; max-width:330px; margin:0 auto; }

  /* room-type rate cards */
  .rates{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
  .rate{ padding:17px 18px; border:1px solid var(--line); border-radius:14px; background:var(--card-2); transition:.22s; cursor:default; }
  .rate:hover{ transform:translateY(-3px); box-shadow:var(--shadow); border-color:var(--gold-soft); }
  .rate .rt{ font-family:'Fraunces'; font-weight:600; font-size:15px; }
  .rate .rp{ font-family:'Fraunces'; font-size:22px; font-weight:440; margin-top:10px; font-variant-numeric:tabular-nums; }
  .rate .rp small{ font-size:11px; color:var(--ink-3); font-weight:400; font-family:'Hanken Grotesk'; }
  .rate .rmeal{ font-size:11.5px; color:var(--ink-2); margin-top:4px; }

  /* AI teaser */
  .ai{ background:linear-gradient(155deg, #20312b, #2E5A48); color:#EAF1EC; border:none; }
  .ai .ttl{ color:#fff; }
  .ai .sub{ color:rgba(234,241,236,.7); }
  .ai-input{ display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.16); border-radius:12px; padding:12px 14px; margin-top:16px; font-size:13px; color:rgba(234,241,236,.6); }
  .ai-sug{ display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
  .ai-sug span{ font-size:11.5px; padding:6px 11px; border-radius:8px; background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.14); cursor:pointer; transition:.2s; }
  .ai-sug span:hover{ background:rgba(255,255,255,.2); }

  .note-box{ background:var(--card-2); border:1px dashed var(--line); border-radius:13px; padding:16px 18px; font-size:13px; color:var(--ink-2); line-height:1.6; }

  .btn{ display:inline-flex; align-items:center; gap:8px; padding:10px 17px; border-radius:11px; border:1px solid var(--line); background:var(--card); font-family:'Hanken Grotesk'; font-size:13px; font-weight:600; color:var(--ink); cursor:pointer; transition:.2s; }
  .btn:hover{ background:var(--card-2); }
  .btn.gold{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .btn.gold:hover{ background:#2a241b; }
  .btn .ico{ width:15px; height:15px; }

  .mut{ color:var(--ink-2); }
  .right{ text-align:right; }
  .flex{ display:flex; }
  .between{ justify-content:space-between; }
  .center{ align-items:center; }
  .gap8{ gap:8px; } .gap12{ gap:12px; } .gap16{ gap:16px; }
  .mt6{margin-top:6px;} .mt14{margin-top:14px;} .mt20{margin-top:20px;} .mt24{margin-top:24px;}

  @media (max-width:1080px){
    .app{ grid-template-columns:1fr; }
    .side{ position:relative; height:auto; flex-direction:row; flex-wrap:wrap; align-items:center; gap:18px; }
    .brand{ margin-bottom:0; } .nav-label{ display:none; }
    .nav{ flex-direction:row; flex-wrap:wrap; flex:1; }
    .side-foot{ margin:0; border:none; padding:0; display:flex; gap:16px; align-items:center; }
    .nav-dot{ display:none; }
    .main{ padding:26px 22px 70px; }
    .kgrid{ grid-template-columns:repeat(2,1fr); }
    .split{ grid-template-columns:1fr; }
    .meta-grid{ grid-template-columns:repeat(2,1fr); }
    h1.page{ font-size:32px; }
  }
  @media (max-width:560px){
    .kgrid{ grid-template-columns:1fr; } .rates{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>
  <div class="bg-field">
    <div class="bg-glow"></div>
    <div class="bg-geo"></div>
    <div class="bg-grain"></div>
  </div>
  <div id="root"></div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "motion/react": "https://esm.sh/motion@11.11.17/react?external=react,react-dom"
    }
  }
  </script>

  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <script type="text/babel" data-type="module" data-presets="react">
  import React, { useState, useEffect, useRef } from "react";
  import { createRoot } from "react-dom/client";
  import { motion, AnimatePresence, useInView } from "motion/react";

  /* ─────────────────────────  helpers  ───────────────────────── */
  const fmt = (n) => new Intl.NumberFormat("en-US").format(Math.round(n));

  function CountUp({ value, dur = 1.1 }){
    const [n, setN] = useState(0);
    const ref = useRef(null);
    const inView = useInView(ref, { once:true, margin:"-40px" });
    useEffect(() => {
      if(!inView) return;
      let raf, start;
      const tick = (t) => {
        if(!start) start = t;
        const p = Math.min((t - start) / (dur*1000), 1);
        const e = 1 - Math.pow(1 - p, 3);
        setN(value * e);
        if(p < 1) raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
      return () => cancelAnimationFrame(raf);
    }, [inView, value]);
    return <span ref={ref}>{fmt(n)}</span>;
  }

  const ease = [0.22, 1, 0.36, 1];
  const reveal = {
    hidden:{ opacity:0, y:18 },
    show:(i=0)=>({ opacity:1, y:0, transition:{ duration:.6, ease, delay:i*0.06 } }),
  };
  const Section = ({ i=0, children, style, className }) => (
    <motion.div custom={i} variants={reveal} initial="hidden" animate="show"
      style={style} className={className}>{children}</motion.div>
  );

  /* ─────────────────────────  icons  ───────────────────────── */
  const I = {
    dash:  <svg className="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M4 13h6V4H4zM14 20h6v-9h-6zM14 4v4h6V4zM4 20h6v-4H4z"/></svg>,
    invoice:<svg className="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M6 2h9l5 5v15H6z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>,

              <div className="note-box">Group requests connecting rooms on the same floor and an early check-in window. Special meal arrangements (3× full board) confirmed with the property.</div>
            </Section>
          </div>
        </div>
      </>
    );
  }

  /* ─────────────────────────  HOTEL DETAIL  ───────────────────────── */
  function RadialMap({ distance, label }){
    const rings = [0.32, 0.55, 0.78, 1.0];
    const ang = -38 * Math.PI/180;
    const rHotel = 0.62;
    const cx = 50, cy = 50;
    const hx = cx + Math.cos(ang)*rHotel*44;
    const hy = cy + Math.sin(ang)*rHotel*44;
    return (
      <div className="radial">
        <svg viewBox="0 0 100 100" width="100%" height="100%">
          <defs>
            <radialGradient id="rg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="rgba(168,123,46,.18)"/>
              <stop offset="100%" stopColor="rgba(168,123,46,0)"/>
            </radialGradient>
          </defs>
          <circle cx="50" cy="50" r="46" fill="url(#rg)"/>
          {rings.map((r,i)=>(
            <motion.circle key={i} cx="50" cy="50" r={r*44} fill="none"
              stroke="var(--line)" strokeWidth="0.5" strokeDasharray="2 3"
              initial={{ opacity:0, scale:.6 }} whileInView={{ opacity:1, scale:1 }}
              viewport={{once:true}} transition={{ delay:i*0.1, duration:.6, ease }}/>
          ))}
          {/* connecting line */}
          <motion.line x1="50" y1="50" x2={hx} y2={hy} stroke="var(--gold)" strokeWidth="1"
            initial={{ pathLength:0 }} whileInView={{ pathLength:1 }} viewport={{once:true}}
            transition={{ delay:.5, duration:.8, ease }}/>
          {/* Haram (center) */}
          <motion.g initial={{scale:0}} whileInView={{scale:1}} viewport={{once:true}} transition={{type:"spring",stiffness:260,delay:.3}}>
            <rect x="45.5" y="45.5" width="9" height="9" rx="1.4" fill="var(--ink)" transform="rotate(45 50 50)"/>
          </motion.g>
          {/* Hotel */}
          <motion.circle cx={hx} cy={hy} r="3.4" fill="var(--gold)" stroke="var(--card)" strokeWidth="1.4"
            initial={{scale:0}} whileInView={{scale:1}} viewport={{once:true}} transition={{type:"spring",stiffness:260,delay:1}}/>
        </svg>
        <div style={{position:"absolute",left:"50%",top:"50%",transform:"translate(-50%,14px)",fontSize:10,letterSpacing:".1em",color:"var(--ink-3)",textTransform:"uppercase",whiteSpace:"nowrap"}}>{label}</div>
        <div style={{position:"absolute",left:`${hx}%`,top:`${hy}%`,transform:"translate(10px,-50%)",fontSize:11,fontWeight:600,fontFamily:"Fraunces"}}>{distance} m</div>
      </div>
    );
  }

  function HotelDetail(){
    return (
      <>
        <div className="topbar">
          <Section i={0}>
            <div className="eyebrow">Hotel · {HOTEL.city}</div>
            <h1 className="page">{HOTEL.name}</h1>
            <div className="flex center gap12 mt14">
              <Stars n={HOTEL.stars}/>
              <span className="chip">{I.pin && React.cloneElement(I.pin,{className:"",style:{width:12,height:12,verticalAlign:"-1px",marginRight:4}})}{HOTEL.area}</span>
            </div>
          </Section>
          <Section i={1}><button className="btn gold">Edit hotel</button></Section>
        </div>

        <div className="kgrid" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
          <Section i={2} className="card kpi">
            <div className="kpi-accent"></div>
            <div className="klabel">{I.pin}Distance to {HOTEL.ref}</div>
            <div className="kval"><CountUp value={HOTEL.distance}/><span className="cur" style={{marginLeft:6}}>m</span></div>
            <div className="kfoot">≈ 4 min walk · Ajyad bridge</div>
          </Section>
          <Section i={3} className="card kpi">
            <div className="kpi-accent"></div>
            <div className="klabel">{I.bed}Avg. occupancy</div>
            <div className="kval">{HOTEL.occ}<span className="cur" style={{marginLeft:6}}>pax / room</span></div>
            <div className="kfoot">basis for room-needs estimate</div>
          </Section>
          <Section i={4} className="card kpi">
            <div className="kpi-accent"></div>
            <div className="klabel">{I.doc}Active reservations</div>
            <div className="kval"><CountUp value={HOTEL.active}/></div>
            <div className="kfoot"><span className="trend up">8 this week</span></div>
          </Section>
        </div>

        <div className="split">
          <div className="stack">
            <Section i={5} className="card pad">
              <h3 className="ttl">Room types & nightly rates</h3>
              <div className="sub" style={{marginBottom:18}}>Contracted rates · SAR per room / night</div>
              <div className="rates">
                {HOTEL.rooms.map((r,i)=>(
                  <div className="rate" key={i}>
                    <div className="flex between center">
                      <span className="rt">{r.type}</span>
                      <span className="chip" style={{fontSize:10}}>{CAP[r.type]} pax</span>
                    </div>
                    <div className="rp">{fmt(r.price)} <small>SAR / night</small></div>
                    <div className="rmeal">{r.meals}</div>
                  </div>
                ))}
              </div>
            </Section>

            <Section i={6} className="card pad">
              <h3 className="ttl">Recent reservations</h3>
              <div className="sub" style={{marginBottom:18}}>Latest groups booked here</div>
              <table className="t">
                <thead><tr><th>Ref</th><th>Group</th><th className="num">Check-in</th><th className="num">Nights</th><th className="num">Rooms</th></tr></thead>
                <tbody>
                  {HOTEL.recent.map(r=>(
                    <tr key={r.num}>
                      <td className="strong" style={{fontFamily:"Fraunces"}}>{r.num}</td>
                      <td>{r.guest}</td>
                      <td className="num mut">{r.ci}</td>
                      <td className="num">{r.nights}</td>
                      <td className="num strong">{r.rooms}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </Section>
          </div>

          <div className="stack">
            <Section i={7} className="card pad">
              <h3 className="ttl">Proximity</h3>
              <div className="sub" style={{marginBottom:6}}>Relative to {HOTEL.ref}</div>
              <RadialMap distance={HOTEL.distance} label={HOTEL.ref}/>
            </Section>

            <Section i={8} className="card pad">
              <h3 className="ttl" style={{marginBottom:12}}>Operator note</h3>
              <div className="note-box">{HOTEL.note}</div>
            </Section>
          </div>
        </div>
      </>
    );
  }

  /* ─────────────────────────  SHELL  ───────────────────────── */
  const NAV = [
    { id:"dash",    label:"Dashboard",     ico:I.dash },
    { id:"invoice", label:"Invoice",       ico:I.invoice },
    { id:"cl",      label:"Confirmation",  ico:I.cl },
    { id:"hotel",   label:"Hotel",         ico:I.hotel },
  ];

  function App(){
    const [route, setRoute] = useState("dash");
    const [co, setCo] = useState("konoz");
    const screens = {
      dash:    <Dashboard co={co}/>,
      invoice: <InvoiceDetail/>,
      cl:      <CLDetail/>,
      hotel:   <HotelDetail/>,
    };
    return (
      <div className="app">
        <aside className="side">
          <motion.div className="brand" initial={{opacity:0,x:-12}} animate={{opacity:1,x:0}} transition={{duration:.7,ease}}>
            <Mark/>
            <div className="brand-txt">
              <div className="brand-name">Sakīna</div>
              <div className="brand-sub">HMS Suite</div>
            </div>
          </motion.div>

          <div className="nav-label">Workspace</div>
          <nav className="nav">
            {NAV.map(n=>(
              <div key={n.id} className={"nav-item"+(route===n.id?" active":"")} onClick={()=>setRoute(n.id)}>
                <span className="nav-dot"></span>{n.ico}{n.label}
              </div>
            ))}
          </nav>

          <div className="side-foot">
            <div className="switcher">
              <button className={"switch-btn konoz"+(co==="konoz"?" on konoz":"")} onClick={()=>setCo("konoz")}>Konoz</button>
              <button className={"switch-btn ijabah"+(co==="ijabah"?" on ijabah":"")} onClick={()=>setCo("ijabah")}>Ijabah</button>
            </div>
            <div className="who">
              <div className="who-av">H</div>
              <div><div className="who-name">Hakim</div><div className="who-role">Operations</div></div>
            </div>
          </div>
        </aside>

        <main className="main">
          <AnimatePresence mode="wait">
            <motion.div key={route}
              initial={{opacity:0, y:14}} animate={{opacity:1, y:0}} exit={{opacity:0, y:-10}}
              transition={{duration:.4, ease}}>
              {screens[route]}
            </motion.div>
          </AnimatePresence>
        </main>
      </div>
    );
  }

  createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>

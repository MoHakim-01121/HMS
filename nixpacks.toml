[phases.setup]
nixPkgs = ["python312", "nodejs_20", "cairo", "pango", "gdk-pixbuf", "libffi"]

[phases.install]
cmds = ["pip install -r requirements.txt", "npm ci"]

[phases.build]
cmds = [
  "npm run build",
  "python manage.py collectstatic --noinput",
]

[start]
cmd = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"

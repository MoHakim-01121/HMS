{% extends 'hw/partials/_base.html' %}
{% load static %}

{% block title %}Pilih Company{% endblock %}

{% block extra_css %}
<style>
  body { display: flex; flex-direction: column; }
  .center-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 10px;
  }
  .panel-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .company-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    width: 100%;
    max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,.03), 0 24px 48px rgba(0,0,0,.4);
  }
  .company-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px 20px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text);
    text-align: center;
    border-right: 1px solid var(--border);
    border-top: 3px solid transparent;
    transition: background .12s, border-top-color .12s;
  }
  .company-card:last-child { border-right: none; }
  .company-card:hover .company-icon { transform: scale(1.1); }
  .company-card.konoz:hover { background: var(--surface-2); border-top-color: var(--accent-2); }
  .company-card.ijabah:hover { background: var(--surface-2); border-top-color: var(--yellow); }
  .company-card.konoz:active, .company-card.ijabah:active { background: var(--surface-3); }
  .company-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .15s cubic-bezier(.34,1.56,.64,1);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -1px;
  }
  .icon-konoz  { background: var(--accent-muted); color: var(--accent-2); }
  .icon-ijabah { background: var(--yellow-muted); color: var(--yellow); }
  .company-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .company-sub {
    font-size: 11px;
    color: var(--text-3);
    margin-top: -10px;
  }
</style>
{% endblock %}

{% block content %}
<div class="center-wrap">
  <span class="panel-label">Selamat datang, {{ user.username }}</span>
  <form method="post" id="company-form" style="width:100%;max-width:360px;">
    {% csrf_token %}
    <input type="hidden" name="company" id="company-input" value="">
    <div class="company-grid">
      <button type="button" class="company-card konoz" onclick="chooseCompany('konoz')">
        <div class="company-icon icon-konoz">KU</div>
        <div class="company-name">Konoz United</div>
      </button>
      <button type="button" class="company-card ijabah" onclick="chooseCompany('ijabah')">
        <div class="company-icon icon-ijabah">IJ</div>
        <div class="company-name">Ijabah</div>
      </button>
    </div>
  </form>
  <script>
  function chooseCompany(val) {
    document.getElementById('company-input').value = val;
    document.getElementById('company-form').submit();
  }
  </script>
</div>
{% endblock %}

<div class="modal-overlay" id="delete-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-warn-icon">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </div>
      <div>
        <div class="modal-title">Hapus {{ delete_modal_title }}</div>
        <div class="modal-subtitle">Tindakan ini tidak dapat dibatalkan</div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-detail"><strong id="delete-obj-name"></strong> akan dihapus permanen.</div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary modal-btn-cancel" onclick="closeDeleteModal()">Batal</button>
      <form method="post" id="delete-form" style="flex:1;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger-solid modal-btn-confirm">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
          Ya, Hapus
        </button>
      </form>
    </div>
  </div>
</div>
<script>
  function showDeleteModal(url, name) {
    var overlay = document.getElementById('delete-modal');
    document.getElementById('delete-form').action = url;
    document.getElementById('delete-obj-name').textContent = name;
    overlay.classList.remove('closing');
    overlay.classList.add('open');
  }
  function closeDeleteModal() {
    document.getElementById('delete-modal').classList.add('closing');
  }
  (function() {
    var overlay = document.getElementById('delete-modal');
    overlay.addEventListener('animationend', function(e) {
      if (e.target === overlay && overlay.classList.contains('closing')) {
        overlay.classList.remove('open', 'closing');
      }
    });
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeDeleteModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeDeleteModal();
    });
  })();
</script>

{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Hakim Workspace</title>
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="{% static 'invoices/css/design.css' %}">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .hud-wrap {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Brand */
    .hud-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .hud-app-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    /* HUD Panel */
    .hud-panel {
      width: 100%;
      position: relative;
      padding: 32px 28px;
      background: var(--surface, rgba(255,255,255,.03));
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,.35);
    }

    /* Fields */
    .hud-fields {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 28px;
    }
    .hud-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .hud-field label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent-2);
    }
    .hud-field input {
      height: 38px;
      padding: 0 0 8px;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-2);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color .15s;
    }
    .hud-field input:focus {
      outline: none;
      border-bottom-color: var(--accent-2);
    }
    .hud-field input::placeholder { color: var(--text-3); font-size: 13px; }

    /* Error */
    .hud-error {
      font-size: 11px;
      color: var(--red);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Button */
    .hud-btn {
      width: 100%;
      height: 42px;
      background: transparent;
      color: var(--accent-2);
      border: 1px solid var(--accent-2);
      border-radius: var(--r);
      font-size: 11px;
      font-weight: 700;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 3px;
      cursor: pointer;
      transition: background .15s, color .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .hud-btn:hover { background: var(--accent-2); color: #fff; }
    .hud-btn:active { opacity: .85; }
    .hud-btn:disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }

    .hud-spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hud-btn.loading .hud-spinner { display: block; }
    .hud-btn.loading .hud-btn-text { letter-spacing: 2px; }

    /* Company toggle — iOS style */
    .co-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent-2);
      margin-bottom: 8px;
    }
    .co-toggle {
      display: flex;
      width: 100%;
      background: rgba(255,255,255,.06);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 28px;
      gap: 2px;
    }
    .co-toggle-btn {
      flex: 1;
      height: 34px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--text-3);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s, color .2s, box-shadow .2s;
    }
    .co-toggle-btn.active-konoz {
      background: var(--surface-3, rgba(255,255,255,.12));
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
    }
    .co-toggle-btn.active-ijabah {
      background: var(--surface-3, rgba(255,255,255,.12));
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
    }

    /* Status line */
    .hud-status {
      font-size: 9px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-align: center;
    }

    input[type="password"]::-ms-reveal,
    input[type="password"]::-ms-clear { filter: invert(100%); }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 100px var(--bg) inset !important;
      -webkit-text-fill-color: var(--text) !important;
      caret-color: var(--text);
    }
  </style>
</head>
<body>
  <div class="hud-wrap">

    <div class="hud-brand">
      <svg width="52" height="52" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="2" width="4.5" height="22" fill="#fff"/>
        <rect x="18.5" y="2" width="4.5" height="22" fill="#fff"/>
        <rect x="7.5" y="11" width="11" height="2.5" fill="#fff"/>
      </svg>
      <div class="hud-app-name">Hakim Workspace</div>
    </div>

    <div class="hud-panel">

      {% if form.errors %}
      <div class="hud-error">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
        Access denied — invalid credentials
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="company" id="company-val" value="konoz">
        <div class="co-label">Company</div>
        <div class="co-toggle">
          <button type="button" class="co-toggle-btn active-konoz" id="btn-konoz" onclick="setCompany('konoz')">Konoz United</button>
          <button type="button" class="co-toggle-btn" id="btn-ijabah" onclick="setCompany('ijabah')">Ijabah</button>
        </div>
        <div class="hud-fields">
          <div class="hud-field">
            <label for="id_username">Identifier</label>
            <input type="text" id="id_username" name="username" autofocus autocomplete="username" placeholder="Enter username">
          </div>
          <div class="hud-field">
            <label for="id_password">Auth Key</label>
            <input type="password" id="id_password" name="password" autocomplete="current-password" placeholder="Enter password">
          </div>
        </div>

        <button type="submit" class="hud-btn" id="login-btn">
          <div class="hud-spinner"></div>
          <span class="hud-btn-text">Authenticate</span>
        </button>
      </form>
    </div>

    <div class="hud-status">Secure access only</div>

  </div>

  <script>
    function setCompany(val) {
      document.getElementById('company-val').value = val;
      var btnK = document.getElementById('btn-konoz');
      var btnI = document.getElementById('btn-ijabah');
      btnK.className = 'co-toggle-btn' + (val === 'konoz' ? ' active-konoz' : '');
      btnI.className = 'co-toggle-btn' + (val === 'ijabah' ? ' active-ijabah' : '');
    }

    document.querySelector('form').addEventListener('submit', function() {
      var btn = document.getElementById('login-btn');
      btn.classList.add('loading');
      btn.disabled = true;
      btn.querySelector('.hud-btn-text').textContent = 'Authenticating';
    });
  </script>

  {% if request.GET.logged_out %}
  <div class="toast-container">
    <div id="logout-toast" class="toast toast-success">Berhasil logout</div>
  </div>
  <script>
    history.replaceState(null, '', '/login/');
    setTimeout(function(){
      var t=document.getElementById('logout-toast');
      if(t){t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(function(){t.remove()},300);}
    },3000);
  </script>
  {% endif %}
</body>
</html>

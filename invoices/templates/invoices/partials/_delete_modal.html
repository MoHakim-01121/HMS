<div class="modal-overlay" id="delete-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-warn-icon">⚠</div>
      <div>
        <div style="font-size:14px;font-weight:700;color:var(--text);">Hapus {{ delete_modal_title }}</div>
        <div style="font-size:12px;color:var(--text-2);">Tindakan ini tidak dapat dibatalkan</div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-detail"><strong id="delete-obj-name"></strong> akan dihapus permanen.</div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" style="flex:1;justify-content:center;" onclick="closeDeleteModal()">Batal</button>
      <form method="post" id="delete-form" style="flex:1;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger" style="width:100%;justify-content:center;height:32px;">Ya, Hapus</button>
      </form>
    </div>
  </div>
</div>
<script>
  function showDeleteModal(url, name) {
    document.getElementById('delete-form').action = url;
    document.getElementById('delete-obj-name').textContent = name;
    document.getElementById('delete-modal').classList.add('open');
  }
  function closeDeleteModal() {
    document.getElementById('delete-modal').classList.remove('open');
  }
  document.getElementById('delete-modal').addEventListener('click', function(e) {
    if (e.target === this) closeDeleteModal();
  });
</script>
